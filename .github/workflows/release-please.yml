name: Release

# Versioning only: maintains a Release PR (bump package.json + CHANGELOG) and,
# on merge, creates the tag vX.Y.Z. Storybook publishing stays on every main
# push (see storybook.yml) — this DS is consumed off main, not by version.
on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
